statement_ingestor:
  pixtral_prompt_system: |
    Extract tabular data or line items from the provided bank statement page image and populate the given JSON extraction template. 
    Add a "value" key to each field in the template. If no value is found for a field, set "value" to 'null'. No extra explanations or elaboration at any point.
    Do not add any extra markdown fences or markdown formatting.
  
  pixtral_prompt_human: |
    Here is the JSON extraction template:
    {json_extraction_template}